<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Jurintegra S.A.C.</title>
    <style>
        :root {
            --color-morado: #6A1B9A; 
            --color-verde: #2E7D32; 
            --color-fondo: #F5F7FA;
            --color-texto: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background-color: var(--color-fondo); color: var(--color-texto); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; text-align: center; padding: 20px;
        }

        h1 { font-size: 8rem; color: var(--color-morado); line-height: 1; }
        h2 { font-size: 2rem; margin-bottom: 20px; }
        p { font-size: 1.1rem; color: #666; margin-bottom: 40px; max-width: 500px; }

        .btn {
            background-color: var(--color-verde); color: white; padding: 15px 30px; 
            text-decoration: none; border-radius: 5px; font-weight: bold; 
            font-size: 1.1rem; transition: 0.3s;
        }
        .btn:hover { background-color: #1b5e20; }
        
        .logo-fondo { font-size: 20rem; position: absolute; opacity: 0.03; color: var(--color-morado); z-index: -1; }
    </style>
</head>
<body>

    <div class="logo-fondo">❖</div>

    <h1>404</h1>
    <h2>Bloque no encontrado</h2>
    <p>Parece que te has perdido en la red. La página o el documento que buscas no existe o ha sido movido de nuestro registro.</p>
    
    <a href="index.html" class="btn">Volver al Inicio Seguro</a>

</body>
</html>
