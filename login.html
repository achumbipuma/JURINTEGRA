<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Jurintegra</title>
    <style>
        :root {
            --color-morado: #6A1B9A; 
            --color-verde: #2E7D32; 
            --color-fondo: #F5F7FA;
            --color-texto: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { display: flex; height: 100vh; background-color: var(--color-fondo); color: var(--color-texto); overflow: hidden; }

        /* Mitad Izquierda (Marca) */
        .login-brand {
            flex: 1;
            background: linear-gradient(135deg, var(--color-morado), #380b54);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            position: relative;
        }
        .login-brand h1 { font-size: 3rem; margin-bottom: 20px; z-index: 10; }
        .login-brand p { font-size: 1.2rem; opacity: 0.8; z-index: 10; max-width: 400px; }
        
        /* Círculos decorativos de fondo */
        .circle { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.05); }
        .circle-1 { width: 300px; height: 300px; top: -50px; left: -50px; }
        .circle-2 { width: 500px; height: 500px; bottom: -100px; right: -100px; }

        /* Mitad Derecha (Formulario) */
        .login-form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
        }
        
        .form-wrapper { width: 100%; max-width: 400px; padding: 20px; }
        .form-wrapper img { height: 50px; border-radius: 8px; margin-bottom: 30px; }
        .form-wrapper h2 { font-size: 1.8rem; margin-bottom: 10px; color: var(--color-morado); }
        .form-wrapper p { color: #666; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .input-group input { 
            width: 100%; padding: 12px 15px; border: 1px solid #ddd; 
            border-radius: 6px; font-size: 1rem; transition: border 0.3s;
        }
        .input-group input:focus { border-color: var(--color-morado); outline: none; }

        .btn-submit {
            width: 100%; padding: 14px; background-color: var(--color-morado); 
            color: white; border: none; border-radius: 6px; font-size: 1rem; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { background-color: #4a148c; }

        .links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 0.9rem; }
        .links a { color: var(--color-verde); text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }

        /* Responsivo: Si es celular, oculta la parte morada */
        @media (max-width: 768px) {
            .login-brand { display: none; }
        }
    </style>
</head>
<body>

    <div class="login-brand">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <h1>Acceso Seguro.</h1>
        <p>Ingresa a tu bóveda digital y gestiona el resguardo Blockchain de tus contratos más importantes.</p>
    </div>

    <div class="login-form-container">
        <div class="form-wrapper">
            <a href="index.html">
                <img src="logo.jpg" alt="Logo Jurintegra">
            </a>
            <h2>Bienvenido de nuevo</h2>
            <p>Ingresa tus credenciales para continuar.</p>

            <!-- Este formulario lleva directamente al dashboard como simulación -->
            <form action="dashboard.html" method="get">
                <div class="input-group">
                    <label>Correo Electrónico Corporativo</label>
                    <input type="email" placeholder="ejemplo@empresa.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Ingresar al Panel</button>
            </form>

            <div class="links">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <a href="registro.html">Crear una cuenta</a>
            </div>
        </div>
    </div>

</body>
</html>
